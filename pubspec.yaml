name: educational_app
description: Medex - Premium Dental Products & Education Platform
publish_to: 'none'
version: 1.0.0+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  crypto: ^3.0.3
  device_info_plus: ^10.1.0
  dio: ^5.4.0
  firebase_auth: ^5.3.4
  firebase_core: ^3.15.2
  firebase_messaging: ^15.0.0
  flutter:
    sdk: flutter
  flutter_local_notifications: ^17.0.0
  flutter_localizations:
    sdk: flutter
  flutter_pdfview: ^1.4.3
  flutter_svg: ^2.0.9
  go_router: ^14.0.0
  google_fonts: ^6.3.0
  google_sign_in: ^6.2.2
  http: ^1.1.0
  file_picker: ^10.3.8
  image_picker: ^1.0.7
  intl: 0.20.2
  path_provider: ^2.1.1
  permission_handler: ^11.2.0
  # pod_player removed: causes iOS crash via flutter_inappwebview
  # webview_flutter removed: causes PlatformException channel-error on iOS
  # YouTube videos now use youtube_explode_dart → direct stream URL → video_player
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2
  share_plus: ^7.2.2
  shared_preferences: ^2.2.2
  sign_in_with_apple: ^7.0.1
  fl_chart: ^0.69.0
  skeletonizer: null
  sqflite: ^2.3.0
  url_launcher: ^6.1.0
  video_player: ^2.8.0
  socket_io_client_new: ^1.0.3
  youtube_explode_dart: '>=3.0.0 <3.0.1'

dev_dependencies:
  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter


flutter_launcher_icons:
  android: false
  ios: true
  image_path: "assets/images/company-logo.jpeg"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
  #  - assets/icons/
  # Cairo font is loaded automatically via google_fonts package
  # No need to include font files manually
